<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Web Systems II – Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #1a2d4a;
      --navy-dk: #142238;
      --navy-lt: #243a5e;
      --amber:   #e8a020;
      --teal:    #0e7569;
      --blue:    #2563eb;
      --red:     #dc2626;
      --border:  #e5e7eb;
      --bg:      #f0f2f5;
      --text:    #111827;
      --text-md: #374151;
      --text-sm: #6b7280;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      height: 52px;
      background: var(--navy);
      border-bottom: 2px solid var(--amber);
      display: flex; align-items: center;
      padding: 0 24px; gap: 12px;
    }
    .hicon {
      width: 32px; height: 32px; border-radius: 6px;
      background: #fff; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .htitle strong { display: block; font-size: 13.5px; font-weight: 700; color: #fff; }
    .htitle span   { display: block; font-size: 11px; color: #a8bcce; }

    /* MAIN */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }

    .login-wrap {
      width: 100%; max-width: 420px;
    }

    /* Welcome block */
    .welcome {
      text-align: center; margin-bottom: 28px;
    }
    .welcome-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 14px;
      box-shadow: 0 4px 16px rgba(26,45,74,.25);
    }
    .welcome h1 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .welcome p  { font-size: 13.5px; color: var(--text-sm); }

    /* Card */
    .card {
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .card-hdr {
      background: var(--navy); padding: 14px 22px;
      border-bottom: 2px solid var(--amber);
    }
    .card-hdr h2 { font-size: 14px; font-weight: 700; color: #fff; }
    .card-hdr p  { font-size: 12px; color: #a8bcce; margin-top: 2px; }
    .card-body { padding: 24px 22px; }

    /* Form */
    .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
    .fg:last-of-type { margin-bottom: 22px; }
    label { font-size: 12px; font-weight: 700; color: var(--text-md); }
    .fc {
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 5px;
      font-family: inherit; font-size: 13.5px; transition: border-color .15s;
      width: 100%;
    }
    .fc:focus { outline: none; border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .fc.err { border-color: var(--red); }

    .pw-wrap { position: relative; }
    .pw-wrap .fc { padding-right: 42px; }
    .pw-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--text-sm); padding: 0;
      line-height: 1;
    }
    .pw-eye:hover { color: var(--text); }

    .err-msg {
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 5px;
      padding: 10px 14px; font-size: 12.5px; color: var(--red);
      font-weight: 600; display: none; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .err-msg.show { display: flex; }
    .err-msg { display: none; }

    .btn-login {
      width: 100%; padding: 11px; border-radius: 5px;
      background: var(--navy); color: #fff;
      font-family: inherit; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer; transition: background .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--navy-dk); }
    .btn-login:active { opacity: .9; }
    .btn-login.loading { opacity: .7; pointer-events: none; }


    /* Footer */
    footer {
      text-align: center; padding: 16px;
      font-size: 11.5px; color: var(--text-sm);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hicon">🎓</div>
  <div class="htitle">
    <strong>Web Systems II</strong>
    <span>521F_SP26_ON</span>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="login-wrap">

    <div class="welcome">
      <div class="welcome-icon">🔐</div>
      <h1>Admin Portal</h1>
      <p>Sign in to access the LMS administration panel.</p>
    </div>

    <div class="card">
      <div class="card-hdr">
        <h2>Sign In</h2>
        <p>daytona_lms · Admin Access</p>
      </div>
      <div class="card-body">

        <div class="err-msg" id="errMsg">
          ⚠️ <span id="errTxt">Invalid username or password.</span>
        </div>

        <div class="fg">
          <label for="uname">Username</label>
          <input class="fc" id="uname" type="text" placeholder="Enter username"
            autocomplete="username" />
        </div>

        <div class="fg">
          <label for="upass">Password</label>
          <div class="pw-wrap">
            <input class="fc" id="upass" type="password" placeholder="Enter password"
              autocomplete="current-password" />
            <button type="button" class="pw-eye" id="eyeBtn" onclick="togglePw()">👁️</button>
          </div>
        </div>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">
          Sign In →
        </button>

      </div>
    </div>

  </div>
</main>

<footer>
  Web Systems II &nbsp;·&nbsp; Daytona State College &nbsp;·&nbsp; Spring 2026
</footer>

<script>
  /* ── Already logged in? Skip to admin ── */
  if (sessionStorage.getItem("lms_auth") === "true") {
    window.location.replace("admin-users.html");
  }

  /* ── Toggle password visibility ── */
  function togglePw() {
    const f = document.getElementById("upass");
    const b = document.getElementById("eyeBtn");
    if (f.type === "password") { f.type = "text";     b.textContent = "🙈"; }
    else                       { f.type = "password"; b.textContent = "👁️"; }
  }

  /* ── Login logic ── */
  function doLogin() {
    const user = document.getElementById("uname").value.trim();
    const pass = document.getElementById("upass").value;
    const errEl = document.getElementById("errMsg");
    const btn   = document.getElementById("loginBtn");

    // Clear previous errors
    errEl.classList.remove("show");
    document.getElementById("uname").classList.remove("err");
    document.getElementById("upass").classList.remove("err");

    if (!user || !pass) {
      document.getElementById("errTxt").textContent = "Please enter both username and password.";
      errEl.classList.add("show");
      if (!user) document.getElementById("uname").classList.add("err");
      if (!pass) document.getElementById("upass").classList.add("err");
      return;
    }

    // Credentials check (case-sensitive)
    if (user === "Admin" && pass === "521F") {
      btn.classList.add("loading");
      btn.textContent = "Signing in…";
      sessionStorage.setItem("lms_auth", "true");
      sessionStorage.setItem("lms_user", "Admin");
      setTimeout(() => {
        window.location.href = "admin-users.html";
      }, 600);
    } else {
      document.getElementById("errTxt").textContent = "Invalid username or password. Please try again.";
      errEl.classList.add("show");
      document.getElementById("uname").classList.add("err");
      document.getElementById("upass").classList.add("err");
      // Shake animation
      document.querySelector(".card").style.animation = "none";
      document.querySelector(".card").offsetHeight;
      document.querySelector(".card").style.animation = "shake .3s ease";
    }
  }

  /* ── Enter key support ── */
  ["uname","upass"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  });

  /* ── Shake keyframe ── */
  const style = document.createElement("style");
  style.textContent = `@keyframes shake {
    0%,100%{transform:translateX(0)}
    20%,60%{transform:translateX(-6px)}
    40%,80%{transform:translateX(6px)}
  }`;
  document.head.appendChild(style);
</script>
</body>
</html>
